name: Android Build and Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: '发布注释（可选，支持多行）'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'v*.*.*'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    name: Build APKs and publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-cache-${{ runner.os }}-v1

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: |
          export GRADLE_OPTS="-Xmx3g" 
          ./gradlew assembleDebug

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: "release"
        run: |
          set -euo pipefail
          export GRADLE_OPTS="-Xmx3g"

          mkdir -p app/release
          STORE_FILE="$PWD/app/release/release-keystore.jks"

          if [ -n "${RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$STORE_FILE"
            chmod 600 "$STORE_FILE"
          fi

          SIGNING_PROPS=""
          if [ -f "$STORE_FILE" ] && [ -n "${RELEASE_STORE_PASSWORD:-}" ] && [ -n "${RELEASE_KEY_PASSWORD:-}" ]; then
            echo "Keystore found — preparing signed release properties"
            # 根据app/build.gradle.kts使用的签名属性对应设置
            SIGNING_PROPS="-PRELEASE_STORE_FILE=$STORE_FILE -PRELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD} -PRELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD} -PRELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS:-release}"
          fi

          echo "Building Release..."
          ./gradlew clean assembleRelease $SIGNING_PROPS

          mkdir -p saved_apks
          find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} saved_apks/ \;

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          mkdir -p release_artifacts
          cp saved_apks/*.apk release_artifacts/
          
          COUNT=$(ls release_artifacts/*.apk 2>/dev/null | wc -l || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "No APKs found."
            exit 1
          fi
          echo "Found $COUNT APKs."

      - name: Compute release metadata
        id: meta
        env:
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          VERSION=""
          if [ -f app/build.gradle.kts ]; then
            VERSION=$(grep -m1 "versionName" app/build.gradle.kts | sed -E "s/.*versionName\\s*=?\\s*\"([^\"]+)\".*/\1/" || true)
          fi
          VERSION=${VERSION:-"build-${GITHUB_RUN_ID}"}

          # Check if triggered by tag
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            case "$VERSION" in
              v*|V*) TAG_NAME="$VERSION" ;;
              *) TAG_NAME="v$VERSION" ;;
            esac
          fi

          if [ -n "${RELEASE_NOTES:-}" ]; then
            BODY="$RELEASE_NOTES"
          else
            BODY=$(git log --pretty=format:"%h %ad - %s (%an)" --date=short --no-merges -n 50 || echo "New Release")
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<EOF'
            echo "$BODY"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body: ${{ steps.meta.outputs.body }}
          fail_on_unmatched_files: false
          files: release_artifacts/*.apk
